name: Release web image

on:
    workflow_dispatch:
        inputs:
            tag:
                description: Existing release tag to publish
                required: true
                type: string
    workflow_call:
        inputs:
            tag:
                required: true
                type: string

permissions:
    contents: read
    packages: write

jobs:
    release-web:
        uses: ./.github/workflows/_release-app.yml
        with:
            app_name: web
            dockerfile: apps/web/Dockerfile
            image_suffix: web
            tag: ${{ inputs.tag }}
            turbo_package: '@auxarmory/web'
        secrets: inherit
