name: Release auth image

on:
    workflow_dispatch:
        inputs:
            tag:
                description: Existing release tag to publish
                required: true
                type: string
    workflow_call:
        inputs:
            tag:
                required: true
                type: string

permissions:
    contents: read
    packages: write

jobs:
    release-auth:
        uses: ./.github/workflows/_release-app.yml
        with:
            app_name: auth
            dockerfile: apps/auth/Dockerfile
            image_suffix: auth
            tag: ${{ inputs.tag }}
            turbo_package: '@auxarmory/auth-service'
        secrets: inherit
