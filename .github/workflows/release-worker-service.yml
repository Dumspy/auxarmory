name: Release worker-service image

on:
    workflow_dispatch:
        inputs:
            tag:
                description: Existing release tag to publish
                required: true
                type: string
    workflow_call:
        inputs:
            tag:
                required: true
                type: string

permissions:
    contents: read
    packages: write

jobs:
    release-worker-service:
        uses: ./.github/workflows/_release-app.yml
        with:
            app_name: worker-service
            dockerfile: apps/worker-service/Dockerfile
            image_suffix: worker-service
            tag: ${{ inputs.tag }}
            turbo_package: '@auxarmory/worker-service'
        secrets: inherit
