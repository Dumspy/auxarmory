name: Release app image

on:
    workflow_call:
        inputs:
            app_name:
                required: true
                type: string
            dockerfile:
                required: true
                type: string
            image_suffix:
                required: true
                type: string
            tag:
                required: true
                type: string
            turbo_package:
                required: true
                type: string

permissions:
    contents: read
    packages: write

jobs:
    release-app:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ inputs.tag }}

            - name: Compute release metadata
              id: release_meta
              env:
                  TAG: ${{ inputs.tag }}
              run: |
                  if [[ ! "$TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
                    echo "Invalid tag '$TAG'. Expected format v<major>.<minor>.<patch>."
                    exit 1
                  fi

                  version="${TAG#v}"
                  major_minor="${version%.*}"

                  printf 'major_minor=%s\n' "$major_minor" >> "$GITHUB_OUTPUT"
                  printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: package.json
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Install dependencies
              env:
                  HUSKY: 0
              run: pnpm install --frozen-lockfile

            - name: Prepare Docker build context
              run: |
                  rm -rf .docker/contexts/${{ inputs.image_suffix }}
                  mkdir -p .docker/contexts
                  pnpm turbo prune --docker ${{ inputs.turbo_package }} --out-dir .docker/contexts/${{ inputs.image_suffix }}

            - name: Compute image repository
              id: image_meta
              env:
                  REPOSITORY: ${{ github.repository }}
              run: |
                  image_repository="ghcr.io/${REPOSITORY,,}"
                  printf 'repository=%s\n' "$image_repository" >> "$GITHUB_OUTPUT"

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to the container registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ github.token }}

            - name: Build and push ${{ inputs.app_name }} image
              uses: docker/build-push-action@v6
              with:
                  context: .docker/contexts/${{ inputs.image_suffix }}
                  file: ${{ inputs.dockerfile }}
                  push: true
                  build-args: |
                      RELEASE_VERSION=${{ steps.release_meta.outputs.version }}
                  tags: |
                      ${{ steps.image_meta.outputs.repository }}-${{ inputs.image_suffix }}:${{ steps.release_meta.outputs.version }}
                      ${{ steps.image_meta.outputs.repository }}-${{ inputs.image_suffix }}:${{ steps.release_meta.outputs.major_minor }}
                      ${{ steps.image_meta.outputs.repository }}-${{ inputs.image_suffix }}:latest
                  cache-from: type=gha,scope=${{ inputs.image_suffix }}
                  cache-to: type=gha,mode=max,scope=${{ inputs.image_suffix }}
